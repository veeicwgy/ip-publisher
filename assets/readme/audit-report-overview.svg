<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="120" y1="70" x2="1490" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F0FDF4"/>
    </linearGradient>
    <style>
      .sans { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
      .panel { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 2; }
      .title { fill: #0F172A; font-size: 42px; font-weight: 700; }
      .subtitle { fill: #475569; font-size: 22px; font-weight: 500; }
      .label { fill: #0F172A; font-size: 26px; font-weight: 700; }
      .copy { fill: #334155; font-size: 18px; font-weight: 500; }
      .small { fill: #64748B; font-size: 16px; font-weight: 500; }
      .score { fill: #0F172A; font-size: 48px; font-weight: 700; }
      .pill { font-size: 15px; font-weight: 700; letter-spacing: 0.04em; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg3)"/>
  <rect x="42" y="42" width="1516" height="816" rx="34" fill="white" stroke="#DCFCE7" stroke-width="4"/>
  <circle cx="1455" cy="150" r="58" fill="#DCFCE7"/>
  <circle cx="220" cy="760" r="74" fill="#DBEAFE"/>

  <text x="100" y="120" class="sans title">Audit Report</text>
  <text x="100" y="160" class="sans subtitle">Publishing is gated by grounding, keyword coverage, structure quality, and platform fit.</text>

  <rect x="80" y="205" width="1440" height="92" rx="28" fill="#0F172A"/>
  <rect x="110" y="230" width="88" height="42" rx="21" fill="#16A34A"/>
  <text x="133" y="257" class="sans pill" fill="#F8FAFC">PASS</text>
  <text x="230" y="260" class="sans copy" fill="#F8FAFC">Ready for publish package handoff after all hard checks pass.</text>

  <rect x="80" y="330" width="330" height="188" rx="24" class="panel"/>
  <text x="110" y="386" class="sans label">Grounding</text>
  <text x="110" y="452" class="sans score">0.94</text>
  <text x="110" y="488" class="sans small">12 / 12 key claims linked to KB chunks</text>

  <rect x="440" y="330" width="330" height="188" rx="24" class="panel"/>
  <text x="470" y="386" class="sans label">Keyword fit</text>
  <text x="470" y="452" class="sans score">1.00</text>
  <text x="470" y="488" class="sans small">Primary terms present in title, intro, and body</text>

  <rect x="800" y="330" width="330" height="188" rx="24" class="panel"/>
  <text x="830" y="386" class="sans label">Structure</text>
  <text x="830" y="452" class="sans score">0.92</text>
  <text x="830" y="488" class="sans small">Q&amp;A, tables, H1-H2-H3, entity labels, code examples</text>

  <rect x="1160" y="330" width="360" height="188" rx="24" class="panel"/>
  <text x="1190" y="386" class="sans label">Platform fit</text>
  <text x="1190" y="452" class="sans score">0.97</text>
  <text x="1190" y="488" class="sans small">Length, tags, title style, summary, and format all valid</text>

  <rect x="80" y="550" width="450" height="250" rx="28" class="panel"/>
  <rect x="108" y="576" width="126" height="34" rx="17" fill="#DCFCE7"/>
  <text x="139" y="599" class="sans pill" fill="#15803D">BLOCKERS</text>
  <text x="108" y="654" class="sans copy">- 0 unsupported claims</text>
  <text x="108" y="690" class="sans copy">- 0 missing primary keywords</text>
  <text x="108" y="726" class="sans copy">- 0 missing must-have sections</text>
  <text x="108" y="764" class="sans small">Any unsupported claim moves the task to reject.</text>

  <rect x="575" y="550" width="450" height="250" rx="28" class="panel"/>
  <rect x="603" y="576" width="126" height="34" rx="17" fill="#FEF3C7"/>
  <text x="634" y="599" class="sans pill" fill="#B45309">WARNINGS</text>
  <text x="603" y="654" class="sans copy">- 1 comparison sentence can cite fresher data</text>
  <text x="603" y="690" class="sans copy">- 1 section can add a more specific example</text>
  <text x="603" y="764" class="sans small">Warnings can still pass if the hard gates are satisfied.</text>

  <rect x="1070" y="550" width="450" height="250" rx="28" class="panel"/>
  <rect x="1098" y="576" width="160" height="34" rx="17" fill="#DBEAFE"/>
  <text x="1129" y="599" class="sans pill" fill="#1D4ED8">QUALITY SIGNALS</text>
  <text x="1098" y="654" class="sans copy">- fact density: 9 citable claims</text>
  <text x="1098" y="690" class="sans copy">- intro mentions product + core value</text>
  <text x="1098" y="726" class="sans copy">- title and summary include trend + keyword</text>
  <text x="1098" y="764" class="sans small">Only audited drafts should move into publishing flows.</text>
</svg>
