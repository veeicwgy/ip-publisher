<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="72" x2="1490" y2="852" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.56" stop-color="#FAF5FF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="hero" x1="110" y1="96" x2="1490" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172554"/>
      <stop offset="0.52" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <radialGradient id="glowPink" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1270 146) rotate(90) scale(240 300)">
      <stop stop-color="#F472B6" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(230 758) rotate(90) scale(170 220)">
      <stop stop-color="#60A5FA" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="0" y="0" width="1600" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .sans { font-family: "PingFang SC","Hiragino Sans GB",ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .eyebrow { font-size: 14px; font-weight: 800; letter-spacing: 0.16em; }
      .hero-title { font-size: 52px; font-weight: 800; }
      .hero-copy { font-size: 22px; font-weight: 500; }
      .pill { font-size: 14px; font-weight: 800; letter-spacing: 0.05em; }
      .card-title { font-size: 24px; font-weight: 800; fill: #0F172A; }
      .copy { font-size: 17px; font-weight: 600; fill: #334155; }
      .small { font-size: 14px; font-weight: 600; fill: #64748B; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1270" cy="146" r="240" fill="url(#glowPink)"/>
  <circle cx="230" cy="758" r="180" fill="url(#glowBlue)"/>

  <g filter="url(#shadow)">
    <rect x="46" y="46" width="1508" height="808" rx="36" fill="#FFFFFF"/>
  </g>

  <g filter="url(#softShadow)">
