  <rect x="122" y="122" width="238" height="36" rx="18" fill="#FCE7F3"/>
  <text x="146" y="145" class="sans eyebrow" fill="#BE185D">04 标准发布包</text>
  <text x="122" y="208" class="sans hero-title" fill="#FFFFFF">一个主题，拆成 7 个渠道版本</text>
  <text x="122" y="250" class="sans hero-copy" fill="#F5D0FE">系统不会让使用者每次都重新决定平台。</text>
  <text x="122" y="286" class="sans hero-copy" fill="#F5D0FE">它会把同一份通过审核的主稿稳定拆成 7 平台内容包。</text>

  <rect x="1112" y="124" width="108" height="34" rx="17" fill="#0B1220" fill-opacity="0.28"/>
