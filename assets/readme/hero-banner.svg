<svg width="1600" height="840" viewBox="0 0 1600 840" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="86" y1="72" x2="1510" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.52" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="910" y1="154" x2="1416" y2="654" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1286 122) rotate(90) scale(220 280)">
      <stop stop-color="#60A5FA" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 720) rotate(90) scale(180 240)">
      <stop stop-color="#C084FC" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="840" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
    <filter id="soft" x="0" y="0" width="1600" height="840" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .sans { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
      .eyebrow { font-size: 14px; font-weight: 800; letter-spacing: 0.16em; }
      .title { font-size: 60px; font-weight: 800; }
      .copy { font-size: 22px; font-weight: 500; }
      .chip { font-size: 14px; font-weight: 800; letter-spacing: 0.05em; }
      .stat { font-size: 32px; font-weight: 800; fill: #0F172A; }
      .small { font-size: 16px; font-weight: 600; fill: #64748B; }
      .cardTitle { font-size: 24px; font-weight: 800; fill: #0F172A; }
      .cardCopy { font-size: 17px; font-weight: 600; fill: #334155; }
    </style>
  </defs>

  <rect width="1600" height="840" fill="#F8FAFC"/>
  <circle cx="1286" cy="122" r="230" fill="url(#glowA)"/>
  <circle cx="180" cy="720" r="210" fill="url(#glowB)"/>

  <g filter="url(#shadow)">
    <rect x="52" y="52" width="1496" height="736" rx="36" fill="url(#heroBg)"/>
  </g>

  <rect x="104" y="108" width="184" height="38" rx="19" fill="#DBEAFE"/>
  <text x="128" y="132" class="sans eyebrow" fill="#1D4ED8">KB CONTENT WORKFLOW</text>

  <text x="104" y="232" class="sans title" fill="#FFFFFF">Generate less noise.</text>
  <text x="104" y="300" class="sans title" fill="#FFFFFF">Ship more trusted content.</text>
  <text x="104" y="356" class="sans copy" fill="#DBEAFE">IP Publisher turns product knowledge, keywords, and trend hooks</text>
  <text x="104" y="392" class="sans copy" fill="#DBEAFE">into audited drafts, publish packages, and a canonical 7-platform bundle.</text>

  <rect x="104" y="442" width="150" height="40" rx="20" fill="#0B1220" fill-opacity="0.34"/>
  <text x="131" y="468" class="sans chip" fill="#F8FAFC">KB-FIRST</text>
  <rect x="268" y="442" width="168" height="40" rx="20" fill="#0B1220" fill-opacity="0.34"/>
  <text x="293" y="468" class="sans chip" fill="#F8FAFC">AUDIT-GATED</text>
  <rect x="450" y="442" width="194" height="40" rx="20" fill="#0B1220" fill-opacity="0.34"/>
  <text x="476" y="468" class="sans chip" fill="#F8FAFC">7-PLATFORM BUNDLE</text>

  <g filter="url(#soft)">
    <rect x="104" y="548" width="690" height="168" rx="30" fill="#0B1220" fill-opacity="0.22"/>
    <rect x="104.75" y="548.75" width="688.5" height="166.5" rx="29.25" stroke="#BFDBFE" stroke-opacity="0.36" stroke-width="1.5"/>
  </g>
  <rect x="138" y="580" width="212" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.18"/>
  <text x="168" y="603" class="sans chip" fill="#F8FAFC">WHAT YOU GET</text>
  <text x="138" y="654" class="sans cardCopy" fill="#FFFFFF">`article.md` + `audit_report.json` + `publish_package.json`</text>
  <text x="138" y="688" class="sans cardCopy" fill="#FFFFFF">plus WeChat, Xiaohongshu, Zhihu, Juejin, CSDN, Toutiao, and Weibo payloads.</text>

  <g filter="url(#shadow)">
    <rect x="900" y="126" width="572" height="588" rx="34" fill="url(#panelGrad)"/>
    <rect x="900.75" y="126.75" width="570.5" height="586.5" rx="33.25" stroke="#DBEAFE" stroke-width="1.5"/>
  </g>

  <rect x="934" y="158" width="178" height="36" rx="18" fill="#0F172A"/>
  <text x="968" y="182" class="sans chip" fill="#F8FAFC">DEMO RESULT SNAPSHOT</text>

  <g filter="url(#soft)">
    <rect x="934" y="220" width="504" height="116" rx="26" fill="#FFFFFF"/>
    <rect x="934.75" y="220.75" width="502.5" height="114.5" rx="25.25" stroke="#DCFCE7" stroke-width="1.5"/>
  </g>
  <rect x="964" y="248" width="88" height="34" rx="17" fill="#16A34A"/>
  <text x="990" y="271" class="sans chip" fill="#F8FAFC">PASS</text>
  <text x="1076" y="268" class="sans stat">1.00 / 1.00</text>
  <text x="964" y="308" class="sans small">Grounding, keyword fit, outline fit, and platform fit all passed in the demo task.</text>

  <g filter="url(#soft)">
    <rect x="934" y="360" width="240" height="144" rx="26" fill="#FFFFFF"/>
    <rect x="934.75" y="360.75" width="238.5" height="142.5" rx="25.25" stroke="#DBEAFE" stroke-width="1.5"/>
  </g>
  <text x="960" y="402" class="sans chip" fill="#1D4ED8">REQUEST</text>
  <text x="960" y="444" class="sans cardTitle">MinerU demo</text>
  <text x="960" y="476" class="sans cardCopy">SEO keywords, trend hook,</text>
  <text x="960" y="504" class="sans cardCopy">outline, and KB scope.</text>

  <g filter="url(#soft)">
    <rect x="1198" y="360" width="240" height="144" rx="26" fill="#FFFFFF"/>
    <rect x="1198.75" y="360.75" width="238.5" height="142.5" rx="25.25" stroke="#FDE68A" stroke-width="1.5"/>
  </g>
  <text x="1224" y="402" class="sans chip" fill="#B45309">OUTPUT</text>
  <text x="1224" y="444" class="sans cardTitle">6 claims</text>
  <text x="1224" y="476" class="sans cardCopy">4 sections, 7 platform</text>
  <text x="1224" y="504" class="sans cardCopy">payloads, publish pack.</text>

  <g filter="url(#soft)">
    <rect x="934" y="528" width="504" height="152" rx="26" fill="#F8FAFC"/>
    <rect x="934.75" y="528.75" width="502.5" height="150.5" rx="25.25" stroke="#CBD5E1" stroke-width="1.5"/>
  </g>
  <text x="962" y="568" class="sans chip" fill="#475569">REAL TITLE</text>
  <text x="962" y="610" class="sans cardTitle">MinerU 知识库：如何稳住自动生成文章</text>
  <text x="962" y="646" class="sans cardCopy">A concrete example from the bundled Phase 1 demo output.</text>
</svg>
