<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="72" x2="1492" y2="850" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.58" stop-color="#EEF4FF"/>
      <stop offset="1" stop-color="#F7FAFF"/>
    </linearGradient>
    <linearGradient id="hero" x1="116" y1="96" x2="1492" y2="366" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.48" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="tree" x1="120" y1="376" x2="520" y2="830" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1290 158) rotate(90) scale(220 290)">
      <stop stop-color="#60A5FA" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 732) rotate(90) scale(180 220)">
      <stop stop-color="#C084FC" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="0" y="0" width="1600" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .sans { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
      .eyebrow { font-size: 14px; font-weight: 800; letter-spacing: 0.16em; }
      .hero-title { font-size: 52px; font-weight: 800; }
      .hero-copy { font-size: 22px; font-weight: 500; }
      .pill { font-size: 15px; font-weight: 800; letter-spacing: 0.05em; }
      .card-title { font-size: 28px; font-weight: 800; fill: #0F172A; }
      .card-copy { font-size: 18px; font-weight: 600; fill: #334155; }
      .small { font-size: 15px; font-weight: 600; fill: #64748B; }
      .tree { font-size: 24px; font-weight: 600; fill: #E2E8F0; }
      .tree-small { font-size: 18px; font-weight: 600; fill: #94A3B8; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1290" cy="158" r="250" fill="url(#glowA)"/>
  <circle cx="210" cy="732" r="180" fill="url(#glowB)"/>

  <g filter="url(#shadow)">
    <rect x="46" y="46" width="1508" height="808" rx="36" fill="#FFFFFF"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="88" y="88" width="1424" height="240" rx="34" fill="url(#hero)"/>
  </g>
  <rect x="122" y="122" width="192" height="36" rx="18" fill="#DBEAFE"/>
  <text x="146" y="145" class="sans eyebrow" fill="#1D4ED8">02 OUTPUT BUNDLE</text>
  <text x="122" y="210" class="sans hero-title" fill="#FFFFFF">What comes back from one run</text>
  <text x="122" y="252" class="sans hero-copy" fill="#DBEAFE">Reviewable files, audit artifacts, and seven platform-ready payloads</text>
  <text x="122" y="288" class="sans hero-copy" fill="#DBEAFE">packaged for editors, operators, and draft-sync handoff.</text>

  <rect x="1074" y="128" width="128" height="34" rx="17" fill="#0B1220" fill-opacity="0.42"/>
  <text x="1100" y="150" class="sans pill" fill="#F8FAFC">REVIEWABLE</text>
  <rect x="1216" y="128" width="148" height="34" rx="17" fill="#0B1220" fill-opacity="0.42"/>
  <text x="1242" y="150" class="sans pill" fill="#F8FAFC">REUSABLE</text>
  <rect x="1378" y="128" width="102" height="34" rx="17" fill="#0B1220" fill-opacity="0.42"/>
  <text x="1407" y="150" class="sans pill" fill="#F8FAFC">READY</text>

  <g filter="url(#softShadow)">
    <rect x="88" y="368" width="470" height="448" rx="32" fill="url(#tree)"/>
  </g>
  <rect x="122" y="402" width="176" height="38" rx="19" fill="#1E293B"/>
  <text x="156" y="427" class="sans pill" fill="#F8FAFC">outputs/&lt;task_id&gt;/</text>
  <text x="126" y="494" class="mono tree">article.md</text>
  <text x="126" y="546" class="mono tree">audit_report.json</text>
  <text x="126" y="598" class="mono tree">publish_package.json</text>
  <text x="126" y="650" class="mono tree">platforms/</text>
  <text x="162" y="692" class="mono tree-small">wechat_official.md</text>
  <text x="162" y="724" class="mono tree-small">xiaohongshu.md</text>
  <text x="162" y="756" class="mono tree-small">zhihu.md</text>
  <text x="312" y="692" class="mono tree-small">juejin.md</text>
  <text x="312" y="724" class="mono tree-small">csdn.md</text>
  <text x="312" y="756" class="mono tree-small">toutiao.md</text>
  <text x="312" y="788" class="mono tree-small">weibo.md</text>

  <g filter="url(#softShadow)">
    <rect x="598" y="368" width="874" height="210" rx="30" fill="#FFFFFF"/>
    <rect x="598.75" y="368.75" width="872.5" height="208.5" rx="29.25" stroke="#DBEAFE" stroke-width="1.5"/>
  </g>
  <rect x="632" y="398" width="126" height="34" rx="17" fill="#DBEAFE"/>
  <text x="662" y="421" class="sans pill" fill="#1D4ED8">article.md</text>
  <text x="632" y="482" class="sans card-title">The main story is editorial-first and AI-friendly</text>
  <text x="632" y="520" class="sans card-copy">Product name + value proposition up front, then Q&amp;A, tables, hierarchy, and concrete examples.</text>
  <rect x="1168" y="410" width="270" height="126" rx="24" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="1200" y="452" class="sans pill" fill="#475569">INCLUDED</text>
  <text x="1200" y="486" class="sans small">H1 / H2 / H3</text>
  <text x="1200" y="514" class="sans small">Comparison tables</text>
  <text x="1200" y="542" class="sans small">Reproducible code blocks</text>

  <g filter="url(#softShadow)">
    <rect x="598" y="608" width="420" height="208" rx="30" fill="#FFFFFF"/>
    <rect x="598.75" y="608.75" width="418.5" height="206.5" rx="29.25" stroke="#DCFCE7" stroke-width="1.5"/>
  </g>
  <rect x="632" y="638" width="192" height="34" rx="17" fill="#DCFCE7"/>
  <text x="658" y="661" class="sans pill" fill="#15803D">publish_package.json</text>
  <text x="632" y="720" class="sans card-title">Operator handoff</text>
  <text x="632" y="756" class="sans card-copy">Title, summary, body, tags, cover brief, publish mode, and sync hints.</text>
  <text x="632" y="788" class="sans small">Clear enough for manual ops and system integrations.</text>

  <g filter="url(#softShadow)">
    <rect x="1052" y="608" width="420" height="208" rx="30" fill="#FFFFFF"/>
    <rect x="1052.75" y="608.75" width="418.5" height="206.5" rx="29.25" stroke="#FEF3C7" stroke-width="1.5"/>
  </g>
  <rect x="1086" y="638" width="168" height="34" rx="17" fill="#FEF3C7"/>
  <text x="1116" y="661" class="sans pill" fill="#B45309">platforms/*.md</text>
  <text x="1086" y="720" class="sans card-title">Seven adapted payloads</text>
  <text x="1086" y="756" class="sans card-copy">WeChat, Xiaohongshu, Zhihu, Juejin, CSDN, Toutiao, and Weibo.</text>
  <text x="1086" y="788" class="sans small">Same source topic, tuned length, tone, and formatting.</text>
</svg>
