<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="120" y1="80" x2="1480" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#FDF4FF"/>
    </linearGradient>
    <style>
      .sans { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .panel { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 2; }
      .title { fill: #0F172A; font-size: 42px; font-weight: 700; }
      .subtitle { fill: #475569; font-size: 22px; font-weight: 500; }
      .card-title { fill: #0F172A; font-size: 24px; font-weight: 700; }
      .copy { fill: #334155; font-size: 17px; font-weight: 500; }
      .small { fill: #64748B; font-size: 15px; font-weight: 500; }
      .pill { font-size: 14px; font-weight: 700; letter-spacing: 0.04em; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg4)"/>
  <rect x="42" y="42" width="1516" height="816" rx="34" fill="white" stroke="#F5D0FE" stroke-width="4"/>
  <circle cx="1470" cy="710" r="76" fill="#E0E7FF"/>
  <circle cx="180" cy="150" r="58" fill="#FCE7F3"/>

  <text x="100" y="120" class="sans title">7 Platform Payloads</text>
  <text x="100" y="160" class="sans subtitle">One approved draft becomes seven adapted payloads with different length, tone, and format rules.</text>

  <rect x="80" y="198" width="1440" height="78" rx="24" fill="#0F172A"/>
  <text x="120" y="248" class="sans copy" fill="#F8FAFC">Same source topic, one audit gate, seven canonical outputs. Not 3. Not 29. Default = 7.</text>

  <rect x="80" y="318" width="330" height="180" rx="24" class="panel"/>
  <rect x="108" y="342" width="112" height="32" rx="16" fill="#DBEAFE"/>
  <text x="138" y="363" class="sans pill" fill="#1D4ED8">HTML</text>
  <text x="108" y="415" class="sans card-title">WeChat Official</text>
  <text x="108" y="452" class="sans copy">Long-form brand article</text>
  <text x="108" y="484" class="sans small">deep explanation, polished structure</text>

  <rect x="440" y="318" width="330" height="180" rx="24" class="panel"/>
  <rect x="468" y="342" width="152" height="32" rx="16" fill="#FCE7F3"/>
  <text x="488" y="363" class="sans pill" fill="#BE185D">MARKDOWN</text>
  <text x="468" y="415" class="sans card-title">Xiaohongshu</text>
  <text x="468" y="452" class="sans copy">Short recommendation post</text>
  <text x="468" y="484" class="sans small">hook first, social tone, compact bullets</text>

  <rect x="800" y="318" width="330" height="180" rx="24" class="panel"/>
  <rect x="828" y="342" width="152" height="32" rx="16" fill="#E0F2FE"/>
  <text x="848" y="363" class="sans pill" fill="#0369A1">MARKDOWN</text>
  <text x="828" y="415" class="sans card-title">Zhihu</text>
  <text x="828" y="452" class="sans copy">Answer or opinion format</text>
  <text x="828" y="484" class="sans small">logic-first, evidence-heavy, Q&amp;A friendly</text>

  <rect x="1160" y="318" width="330" height="180" rx="24" class="panel"/>
  <rect x="1188" y="342" width="152" height="32" rx="16" fill="#DCFCE7"/>
  <text x="1208" y="363" class="sans pill" fill="#15803D">MARKDOWN</text>
  <text x="1188" y="415" class="sans card-title">Juejin</text>
  <text x="1188" y="452" class="sans copy">Developer article</text>
  <text x="1188" y="484" class="sans small">technical framing, code, reproducible steps</text>

  <rect x="260" y="544" width="330" height="180" rx="24" class="panel"/>
  <rect x="288" y="568" width="152" height="32" rx="16" fill="#FEF3C7"/>
  <text x="308" y="589" class="sans pill" fill="#B45309">MARKDOWN</text>
  <text x="288" y="641" class="sans card-title">CSDN</text>
  <text x="288" y="678" class="sans copy">Tutorial or troubleshooting post</text>
  <text x="288" y="710" class="sans small">step-by-step, practical fixes, snippets</text>

  <rect x="635" y="544" width="330" height="180" rx="24" class="panel"/>
  <rect x="663" y="568" width="112" height="32" rx="16" fill="#FED7AA"/>
  <text x="693" y="589" class="sans pill" fill="#C2410C">HTML</text>
  <text x="663" y="641" class="sans card-title">Toutiao</text>
  <text x="663" y="678" class="sans copy">Trend amplification article</text>
  <text x="663" y="710" class="sans small">broad hook, digestible, keyword aware</text>

  <rect x="1010" y="544" width="330" height="180" rx="24" class="panel"/>
  <rect x="1038" y="568" width="104" height="32" rx="16" fill="#E2E8F0"/>
  <text x="1069" y="589" class="sans pill" fill="#475569">TEXT</text>
  <text x="1038" y="641" class="sans card-title">Weibo</text>
  <text x="1038" y="678" class="sans copy">Short summary and traffic hook</text>
  <text x="1038" y="710" class="sans small">tight phrasing, clear CTA, short payload</text>

  <rect x="80" y="760" width="1440" height="78" rx="24" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="118" y="808" class="sans copy">Each card maps to title, summary, body, tags, and cover brief fields inside the publish package.</text>
</svg>
