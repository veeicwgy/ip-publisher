  <rect x="120" y="766" width="1360" height="40" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="152" y="792" class="sans copy">Each platform card maps to title, summary, body, tags, and cover brief fields inside the publish package.</text>
