  </g>
  <rect x="122" y="122" width="238" height="36" rx="18" fill="#FCE7F3"/>
  <text x="146" y="145" class="sans eyebrow" fill="#BE185D">04 CANONICAL PAYLOADS</text>
  <text x="122" y="208" class="sans hero-title" fill="#FFFFFF">One source topic, seven channel versions</text>
  <text x="122" y="250" class="sans hero-copy" fill="#F5D0FE">The system does not ask users to re-decide platforms every time.</text>
  <text x="122" y="286" class="sans hero-copy" fill="#F5D0FE">It adapts one approved draft into a consistent 7-platform bundle.</text>

  <rect x="1112" y="124" width="108" height="34" rx="17" fill="#0B1220" fill-opacity="0.28"/>
